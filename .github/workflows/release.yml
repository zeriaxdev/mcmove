name: release

# Build standalone mcmove binaries for macOS / Linux / Windows and attach them to
# a GitHub Release whenever a vX.Y.Z (or vX.Y.Z-alpha.N) tag is pushed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: mcmove-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: mcmove-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: mcmove-x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: mcmove-x86_64-pc-windows-msvc.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p mcmove-cli
      - name: Package binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/mcmove"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.asset }}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          generate_release_notes: true
